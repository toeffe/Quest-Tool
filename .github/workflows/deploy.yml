name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        # Custom domain (quest.toeffe.uk) serves at the site root, not /repo/.
        env:
          VITE_BASE: /

      - name: Publish built site to docs/ on main
        run: |
          # peaceiris/actions-gh-pages refuses main→main deploys; sync dist into docs/ instead.
          # Keep QA markdown in docs/; replace previous build artifacts (index.html, assets/, …).
          rsync -a --delete --exclude='*.md' ./dist/ ./docs/
          touch docs/.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/
          if git diff --staged --quiet; then
            echo "No site changes to deploy."
            exit 0
          fi

          git commit -m "deploy: ${{ github.sha }} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
