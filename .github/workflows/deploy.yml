name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Cancel stale builds on new pushes; do not cancel deploy jobs (avoids wedging Pages API).
    concurrency:
      group: pages-build
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        # Custom domain (quest.toeffe.uk) serves at the site root, not /repo/.
        env:
          VITE_BASE: /

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment_retry.outputs.page_url || steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 900000

      - name: Wait before retry
        if: steps.deployment.outcome != 'success'
        run: sleep 60

      - name: Deploy to GitHub Pages (retry)
        id: deployment_retry
        if: steps.deployment.outcome != 'success'
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 900000

      - name: Check deploy result
        if: steps.deployment.outcome != 'success' && steps.deployment_retry.outcome != 'success'
        run: |
          echo "Pages deploy failed after retry"
          exit 1
