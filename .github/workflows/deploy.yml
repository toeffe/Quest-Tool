name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        # Custom domain (quest.toeffe.uk) serves at the site root, not /repo/.
        env:
          VITE_BASE: /

      - name: Publish built site to docs/ on main
        run: |
          set -euo pipefail

          if [ ! -f ./dist/index.html ]; then
            echo "::error::Build did not produce dist/index.html"
            exit 1
          fi

          # Keep QA markdown in docs/; replace previous build artifacts (index.html, assets/, …).
          rsync -a --delete --exclude='*.md' ./dist/ ./docs/
          touch docs/.nojekyll
          test -f docs/index.html

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A docs/
          git status --short docs/
          git diff --staged --stat

          if git diff --staged --quiet; then
            echo "::warning::No site changes to commit."
            exit 0
          fi

          git commit -m "deploy: ${{ github.sha }} [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
